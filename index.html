<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
    <title>English Janala | Let's Learn Vocabularies</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind and daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- external css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="sticky">
      <div class="bg-[#BADEFF]/26 shadow-sm">
        <nav class="navbar py-4 max-lg:py-3 h-full lg:container lg:mx-auto">
          <div
            class="navbar-left flex items-center w-full flex-row-reverse justify-between lg:flex-row lg:justify-start"
          >
            <div class="flex-none max-lg:px-4">
              <a
                class="flex items-center gap-1 font-semibold text-xl max-lg:text-sm"
                href=""
              >
                English<img src="./assets/logo.png" class="w-9 max-lg:w-7" />
                <span class="font-bangla">জানালা</span>
              </a>
            </div>

            <div class="flex-none lg:hidden">
              <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4 6h16M4 12h8m-8 6h16"
                    />
                  </svg>
                </div>
                <ul
                  tabindex="-1"
                  class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow gap-3"
                >
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-solid fa-circle-question"></i> FAQ</a
                  >
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-brands fa-leanpub"></i> Learn</a
                  >
                  <a class="btn btn-outline btn-primary"
                    ><i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout</a
                  >
                </ul>
              </div>
            </div>
          </div>

          <div class="navbar-right hidden lg:flex gap-4">
            <a class="btn btn-outline btn-primary"
              ><i class="fa-solid fa-circle-question"></i> FAQ</a
            >
            <a class="btn btn-outline btn-primary"
              ><i class="fa-brands fa-leanpub"></i> Learn</a
            >
            <a class="btn btn-outline btn-primary"
              ><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a
            >
          </div>
        </nav>
      </div>
    </header>
    <main>
      <!-- hero section -->
      <section id="hero" class="flex max-lg:pb-12.5 max-lg:flex-col-reverse max-lg:text-center min-h-[90dvh] items-center justify-between container max-sm:max-w-11/12 mx-auto">
        <!-- hero contents or hero left -->
        <div class="hero-contents space-y-7 max-w-[728px] flex-1">
          <div class="heading space-y-6">
            <h1 class="text[#18181B] text-5xl font-bold"><span class="text-[#00BCFF]">English</span> is Easy!!</h1>
            <p class="text[#18181B] text-2xl font-medium font-bangla">
              আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
              আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
              যাবে অন্য একটি Level এ
            </p>
          </div>
          <!-- get started -->
          <div class="get-started flex flex-col gap-5">
            <input type="text" placeholder="Enter Your Name" class="input input-md max-lg:w-full outline-[#00BCFF]"/>
            <input type="text" placeholder="•••••••••••••••" class="input input-md max-lg:w-full outline-[#00BCFF]"/>
            <a class="btn btn-primary lg:w-fit">Get Started</a>
          </div>
        </div>
        <!-- hero banner -->
        <div class="hero-banner flex-1 flex justify-end">
          <img src="./assets/hero-student.png">
        </div>
      </section>
    </main>
  </body>
</html>
